---
# RailConnect Flask Application Deployment
# Manages pod replicas, rolling updates, resource management, and pod lifecycle

apiVersion: apps/v1
kind: Deployment
metadata:
  name: railconnect-app
  namespace: railconnect-prod
  labels:
    app: railconnect-app
    version: v1.0.0
    component: api
spec:
  # Start with 3 replicas — HPA will scale up to 30 under load
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # Add 1 new pod before removing old
      maxUnavailable: 0   # Never remove pod before new one is ready (zero-downtime)

  selector:
    matchLabels:
      app: railconnect-app

  template:
    metadata:
      name: railconnect-app
      labels:
        app: railconnect-app
        version: v1.0.0
      annotations:
        # Prometheus scrape configuration
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        # Datadog APM (optional)
        ad.datadoghq.com/railconnect-app.check_names: '["prometheus"]'

    spec:
      containers:
        - name: railconnect-app
          image: railconnect:latest
          imagePullPolicy: Never

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # Environment variables — inject pod name for load balancer demo
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: FLASK_ENV
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: "INFO"

          # Liveness probe: restarts dead pods
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30  # Wait 30s after container start
            periodSeconds: 10         # Check every 10s
            timeoutSeconds: 5         # 5s timeout per check
            failureThreshold: 3       # Restart after 3 failures
            successThreshold: 1       # 1 success to recover

          # Readiness probe: removes unready pods from load balancer
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 10   # Quick startup check
            periodSeconds: 5          # Check every 5s
            timeoutSeconds: 3
            failureThreshold: 2       # Remove from LB after 2 failures
            successThreshold: 1

          # Startup probe: gives slow-starting apps time to boot
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30      # Allow 5 minutes (30 * 10s) to start
            successThreshold: 1

          # Resource requests and limits — critical for HPA
          resources:
            requests:
              memory: "128Mi"           # Minimum guaranteed memory
              cpu: "100m"               # 0.1 CPU cores
            limits:
              memory: "512Mi"           # Maximum memory — triggers OOMKilled
              cpu: "500m"               # Maximum CPU — may be throttled

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

          # Volume mounts (if needed)
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      # Restart policy
      restartPolicy: Always

      # Pod termination grace period: time to gracefully shutdown
      terminationGracePeriodSeconds: 30

      # ImagePullSecrets for private Docker Hub (if needed)
      # imagePullSecrets:
      #   - name: dockerhub-secret

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}

      # DNS policy for Kubernetes service discovery
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: ndots
            value: "2"

---
# Deployment for staging environment (same config, different namespace)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: railconnect-app
  namespace: railconnect-staging
  labels:
    app: railconnect-app
    version: v1.0.0
    component: api
    environment: staging
spec:
  replicas: 2  # Fewer replicas in staging

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: railconnect-app

  template:
    metadata:
      name: railconnect-app
      labels:
        app: railconnect-app
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"

    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: railconnect-app

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: railconnect-app
          image: your-dockerhub-username/railconnect:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FLASK_ENV
              value: "staging"
            - name: APP_VERSION
              value: "1.0.0-staging"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

      volumes:
        - name: tmp
          emptyDir: {}

      dnsPolicy: ClusterFirst
