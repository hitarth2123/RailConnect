---
# Network Policy: Control traffic to/from pods (optional)
# Restricts which pods can talk to railconnect-app

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: railconnect-network-policy
  namespace: railconnect-prod
  labels:
    app: railconnect-app

spec:
  podSelector:
    matchLabels:
      app: railconnect-app

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow from Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000

    # Allow from Prometheus for metrics
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 5000

  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

    # Allow external HTTPS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
