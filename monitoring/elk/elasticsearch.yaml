---
# Elasticsearch Cluster for RailConnect Logging
# Requires ECK (Elastic Cloud on Kubernetes) operator
# Install: kubectl apply -f https://download.elastic.co/downloads/eck/2.10.0/all-in-one.yaml

apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: railconnect-logs
  namespace: monitoring
  labels:
    app: elasticsearch
    stack: logging

spec:
  version: 8.11.0

  # Configure node roles and pod count
  nodeSets:
    # Master-eligible nodes (quorum voting)
    - name: master
      count: 3
      config:
        node.roles: ["master"]
        node.store.allow_mmap: false
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: standard
            resources:
              requests:
                storage: 30Gi
      podTemplate:
        metadata:
          labels:
            node: master
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 1Gi
                  cpu: 500m
                limits:
                  memory: 2Gi
                  cpu: 1000m

    # Data nodes (store and index documents)
    - name: data
      count: 3
      config:
        node.roles: ["data", "ingest"]
        node.store.allow_mmap: false
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: standard
            resources:
              requests:
                storage: 30Gi
      podTemplate:
        metadata:
          labels:
            node: data
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 2Gi
                  cpu: 500m
                limits:
                  memory: 4Gi
                  cpu: 1000m

  # HTTP TLS configuration
  http:
    tls:
      selfSignedCertificate:
        disabled: true

---
# Kibana for Log Visualization and Management

apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: railconnect-kibana
  namespace: monitoring
  labels:
    app: kibana
    stack: logging

spec:
  version: 8.11.0

  count: 1  # Single Kibana instance for non-production use

  elasticsearchRef:
    name: railconnect-logs

  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: 1000m

  # Kibana service configuration
  http:
    service:
      spec:
        type: LoadBalancer  # Or ClusterIP with Ingress
        ports:
          - name: http
            port: 5601

---
# Service for Elasticsearch (headless for StatefulSet)

apiVersion: v1
kind: Service
metadata:
  name: railconnect-logs
  namespace: monitoring
  labels:
    app: elasticsearch

spec:
  clusterIP: None  # Headless service
  selector:
    elasticsearch.k8s.elastic.co/cluster-name: railconnect-logs
  ports:
    - port: 9200
      name: http
    - port: 9300
      name: transport

---
# Secret for Elasticsearch credentials (auto-generated by ECK, but here's the pattern)

