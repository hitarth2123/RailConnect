---
# Service Account for Filebeat to send logs

apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    app: filebeat

---
# RBAC for Filebeat (read pod logs)

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
  labels:
    app: filebeat

rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/logs
    verbs:
      - get
      - watch
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
  labels:
    app: filebeat

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: filebeat

subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: monitoring

---
# ConfigMap for Filebeat configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: monitoring
  labels:
    app: filebeat

data:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        enabled: true
        paths:
          - /var/lib/docker/containers/*/*.log

    processors:
      - add_kubernetes_metadata:
          in_cluster: true
      - add_docker_metadata:

    output.elasticsearch:
      hosts: ["railconnect-logs:9200"]
      index: "filebeat-%{+yyyy.MM.dd}"

    logging.level: info

---
# DaemonSet for Filebeat (runs on all nodes, collects container logs)

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    app: filebeat

spec:
  selector:
    matchLabels:
      app: filebeat

  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.11.0
          imagePullPolicy: IfNotPresent

          volumeMounts:
            - name: config
              mountPath: /etc/filebeat.yml
              subPath: filebeat.yml
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

          env:
            - name: ELASTICSEARCH_HOST
              value: railconnect-logs
            - name: ELASTICSEARCH_PORT
              value: "9200"

          resources:
            requests:
              memory: 100Mi
              cpu: 100m
            limits:
              memory: 200Mi
              cpu: 200m

      volumes:
        - name: config
          configMap:
            name: filebeat-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
