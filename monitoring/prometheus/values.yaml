# Prometheus Stack Helm Values for RailConnect
# Used by: helm install prometheus prometheus-community/kube-prometheus-stack -f values.yaml

# Prometheus configuration
prometheus:
  enabled: true

  prometheusSpec:
    # Data retention period
    retention: 15d
    retentionSize: "10GB"

    # Resource management
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

    # Service monitor selectors
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}

    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

    # Scrape configuration
    additionalScrapeConfigs:
      - job_name: 'railconnect-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - railconnect-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

    # Alerting
    alertingRules:
      - railconnect-alerts.yaml

# Alertmanager configuration
alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: ""  # TODO: Set Slack webhook URL

    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h

      routes:
        - match:
            severity: critical
          receiver: 'critical'
          continue: true

        - match:
            severity: warning
          receiver: 'warning'

    receivers:
      - name: 'default'

      - name: 'critical'
        slack_configs:
          - channel: '#railconnect-critical'
            title: 'Critical Alert'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      - name: 'warning'
        slack_configs:
          - channel: '#railconnect-warnings'
            title: 'Warning Alert'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi

# Grafana configuration
grafana:
  enabled: true
  adminPassword: "admin123"  # TODO: Change in production!

  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          isDefault: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          updateIntervalSeconds: 10
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # RailConnect custom dashboard
      railconnect-dashboard:
        url: https://grafana.com/api/dashboards/12114/revisions/1/download

      # Kubernetes cluster monitoring
      kubernetes-cluster:
        url: https://grafana.com/api/dashboards/7249/revisions/1/download

# Prometheus Node Exporter
nodeExporter:
  enabled: true

# Kube State Metrics
kubeStateMetrics:
  enabled: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  manageCrds: true

# Metrics server (required for HPA)
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    prometheus: true
    prometheusOperator: true
